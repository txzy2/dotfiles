# === Font ===
font_family      Hack Nerd Font Mono FC Ligatured CCG
bold_font        Hack Nerd Font Mono FC Ligatured CCG Bold
italic_font      Hack Nerd Font Mono FC Ligatured CCG Italic
bold_italic_font Hack Nerd Font Mono FC Ligatured CCG Bold Italic
font_size        9.0
modify_font_size no
# Делает глифы чётче на Retina/HiDPI
text_composition_strategy 1.5 0

# === Theme ===
include ~/.config/kitty/tokyo-night.conf

# === Window ===
window_border_width 1.0
window_padding_width 1 2
hide_window_decorations no
resize_in_steps no
single_window_margin_width -1
confirm_close_surface no
initial_window_width 120c
initial_window_height 36c

# === Cursor ===
cursor_shape block
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# === Scrollback ===
scrollback_lines 10000
scrollback_pager_history_size 50

# === Tab bar ===
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
active_tab_font_style bold
inactive_tab_font_style normal
tab_bar_min_tabs 1

# === Performance ===
repaint_delay 10
input_delay 3
sync_to_monitor no

# === Background ===
background_opacity 0.92
dynamic_background_opacity yes
blur_background yes
blur_radius 12

# === Misc ===
enable_audio_bell no
enable_kitty_keyboard_protocol no
wayland_enable_ime no
modify_keyboard_handling no
term xterm-256color

# === Clipboard ===
clipboard_control write-clipboard write-primary read-clipboard read-primary
copy_on_select clipboard

# === URLs ===
url_style curly
open_url_with default

# === Mouse ===
wheel_scroll_multiplier 5
mouse_hide_wait 3.0

# === Shell integration ===
shell_integration enabled

# === Hints (подсветка URL, путей, цветов, чисел) ===
# Alt+U — подсветка URL
map alt+u kitten hints --type url
# Alt+F — подсветка файловых путей
map alt+f kitten hints --type file --program -
# Alt+H — подсветка hash (40+ hex символов)
map alt+h kitten hints --type hash --program -
# Alt+C — подсветка CSS цветов (#fff, #aabbcc)
map alt+c kitten hints --type css-color --program -
# Alt+N — подсветка чисел
map alt+n kitten hints --type number --program -
